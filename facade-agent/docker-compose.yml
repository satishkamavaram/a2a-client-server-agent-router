version: '3.8'

services:
  ai-app:
    image: ai-app:latest
    container_name: ai-app
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/app/logs
      - .env:/app/src/ai_app/.env
    networks:
      - ai-app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

networks:
  ai-app-network:
    driver: bridge
    name: ai-app-network