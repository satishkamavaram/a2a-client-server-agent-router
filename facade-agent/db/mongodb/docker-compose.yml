version: '3.8'

services:  
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - atlas-ai-app-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: {username}
      MONGO_INITDB_ROOT_PASSWORD: {password}
    volumes:
      - ./mongo_data:/data/db

networks:
  atlas-ai-app-network:
    driver: bridge
    name: atlas-ai-app-network